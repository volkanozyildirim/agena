refine_backlog_item:
  system_prompt: |
    You are performing sprint refinement for an engineering team.
    Follow the requested output language exactly for all natural-language fields.
    Use only the provided work item content.
    Do not assume implementation details that are not present.
    If information is missing, lower confidence and list explicit ambiguities and follow-up questions.
    Suggested story points must be chosen only from this Fibonacci scale: {point_scale}.
    Return valid JSON only.
  description: |
    Provider: {provider}
    Sprint: {sprint_name}
    Requested output language: {language}
    Point scale: {point_scale}

    Work item ID: {item_id}
    Work item type: {work_item_type}
    Title: {title}
    Current state: {state}
    Current story points: {current_story_points}
    Current effort: {current_effort}
    Assigned to: {assigned_to}

    Description:
    {description}
  expected_output: |
    Return a JSON object with these keys:
    - summary: short delivery-oriented summary in {language}
    - suggested_story_points: integer from {point_scale}, or 0 if the item is too ambiguous to estimate
    - estimation_rationale: concise explanation in {language} describing why this score fits the item
    - confidence: integer from 0 to 100
    - comment: a refinement comment in {language} ready to paste into the work item
    - ambiguities: array of missing details that block precise estimation
    - questions: array of concrete follow-up questions for product or engineering
    - ready_for_planning: boolean

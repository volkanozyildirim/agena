name: Release CLI

on:
  push:
    tags:
      - 'v*.*.*'
  # Manual trigger for snapshot/dry-run testing. Actions → "Release CLI"
  # → "Run workflow" on main.
  workflow_dispatch:
    inputs:
      snapshot:
        description: 'Dry run (no release, no tap update)'
        type: boolean
        default: true

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: go mod tidy
        working-directory: packages/cli-go
        run: go mod tidy

      - name: Pick goreleaser args
        id: gr_args
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.snapshot }}" == "true" ]]; then
            echo "args=release --snapshot --clean --skip=publish,sign" >> "$GITHUB_OUTPUT"
          else
            echo "args=release --clean" >> "$GITHUB_OUTPUT"
          fi

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: ${{ steps.gr_args.outputs.args }}
          workdir: packages/cli-go
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  publish-npm:
    runs-on: ubuntu-latest
    needs: goreleaser
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Skip if NPM_TOKEN not set
        if: env.NPM_TOKEN == ''
        run: |
          echo "NPM_TOKEN not configured — skipping npm publish. Brew release continues."
          exit 0

      - uses: actions/checkout@v4
        if: env.NPM_TOKEN != ''

      - uses: actions/setup-node@v4
        if: env.NPM_TOKEN != ''
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Build + publish @agena/cli
        if: env.NPM_TOKEN != ''
        working-directory: packages/cli
        run: |
          npm ci
          npm run build
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

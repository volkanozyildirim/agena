version: '2.2'

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ai_agent_api
    env_file:
      - .env
    ports:
      - '8010:8010'
    volumes:
      - ./api:/app/api
      - ./alembic:/app/alembic
      - ./services:/app/services
      - ./agents:/app/agents
      - ./memory:/app/memory
      - ./integrations:/app/integrations
      - ./models:/app/models
      - ./schemas:/app/schemas
      - ./core:/app/core
      - ./workers:/app/workers
      - ./data:/app/data
      - ${HOST_REPO_ROOT:-/Users}:${HOST_REPO_ROOT:-/Users}
    depends_on:
      - mysql
      - redis
      - qdrant
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ai_agent_worker
    env_file:
      - .env
    volumes:
      - ./api:/app/api
      - ./alembic:/app/alembic
      - ./services:/app/services
      - ./agents:/app/agents
      - ./memory:/app/memory
      - ./integrations:/app/integrations
      - ./models:/app/models
      - ./schemas:/app/schemas
      - ./core:/app/core
      - ./workers:/app/workers
      - ./data:/app/data
      - ${HOST_REPO_ROOT:-/Users}:${HOST_REPO_ROOT:-/Users}
    command: ["python", "-m", "workers.redis_worker"]
    depends_on:
      - mysql
      - redis
      - qdrant
    restart: unless-stopped

  cli-bridge:
    build:
      context: .
      dockerfile: docker/Dockerfile.bridge
    container_name: ai_agent_cli_bridge
    env_file:
      - .env
    ports:
      - '9876:9876'
      - '1455:1455'
    volumes:
      - ${HOST_REPO_ROOT:-/Users}:${HOST_REPO_ROOT:-/Users}
      - cli_codex_auth:/root/.codex
      - cli_claude_auth:/root/.claude
    restart: unless-stopped

  frontend_blue:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ai_agent_frontend_blue
    env_file:
      - frontend/.env.example
    ports:
      - '3011:3010'
    depends_on:
      - backend
    restart: unless-stopped

  frontend_green:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ai_agent_frontend_green
    env_file:
      - frontend/.env.example
    ports:
      - '3012:3010'
    depends_on:
      - backend
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: ai_agent_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: ai_agent_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ai_agent_redis
    ports:
      - '6380:6379'
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: ai_agent_qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - '6333:6333'
      - '6334:6334'
    restart: unless-stopped

volumes:
  mysql_data:
  qdrant_data:
  cli_codex_auth:
  cli_claude_auth:

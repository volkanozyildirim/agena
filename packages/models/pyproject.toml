[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agena-models"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "agena-core",
    "SQLAlchemy>=2.0",
    "pydantic>=2.11",
    "email-validator>=2.3",
]

[tool.setuptools.packages.find]
where = ["src"]

[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agena-agents"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "agena-core",
    "agena-models",
    "agena-services",
    "crewai>=0.186",
    "langgraph>=0.6",
    "qdrant-client>=1.15",
    "openai>=1.99",
]

[tool.setuptools.packages.find]
where = ["src"]
